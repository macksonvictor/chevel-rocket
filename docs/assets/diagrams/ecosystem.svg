<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="Chevel Rocket ecosystem architecture">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#05070a"/><stop offset="1" stop-color="#101820"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#31ff8d"/><stop offset="1" stop-color="#65d8ff"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <text x="60" y="78" fill="#f3fff8" font-family="Segoe UI, Arial" font-size="42" font-weight="800">Chevel Robotics Ecosystem</text>
  <text x="62" y="112" fill="#8fa7b2" font-family="Segoe UI, Arial" font-size="20">AI intelligence, native control and physical prototype layers.</text>
  <g font-family="Segoe UI, Arial">
    <rect x="90" y="190" width="230" height="150" rx="22" fill="#111820" stroke="#31ff8d" stroke-width="2"/>
    <text x="125" y="245" fill="#f3fff8" font-size="30" font-weight="800">Chevel AI</text>
    <text x="125" y="284" fill="#8fa7b2" font-size="18">Reasoning, memory,</text>
    <text x="125" y="310" fill="#8fa7b2" font-size="18">language and planning</text>
    <rect x="405" y="190" width="260" height="150" rx="22" fill="#111820" stroke="#65d8ff" stroke-width="2"/>
    <text x="442" y="245" fill="#f3fff8" font-size="30" font-weight="800">Chevel Rocket</text>
    <text x="442" y="284" fill="#8fa7b2" font-size="18">Cockpit, telemetry,</text>
    <text x="442" y="310" fill="#8fa7b2" font-size="18">commands and safety</text>
    <rect x="750" y="190" width="250" height="150" rx="22" fill="#111820" stroke="#31ff8d" stroke-width="2"/>
    <text x="790" y="245" fill="#f3fff8" font-size="30" font-weight="800">WIESEL Mini</text>
    <text x="790" y="284" fill="#8fa7b2" font-size="18">ESP32, servos,</text>
    <text x="790" y="310" fill="#8fa7b2" font-size="18">sensors and prototype</text>
    <path d="M320 265 H405" stroke="url(#accent)" stroke-width="5" filter="url(#glow)"/>
    <path d="M665 265 H750" stroke="url(#accent)" stroke-width="5" filter="url(#glow)"/>
    <polygon points="395,255 415,265 395,275" fill="#65d8ff"/>
    <polygon points="740,255 760,265 740,275" fill="#31ff8d"/>
    <rect x="260" y="420" width="680" height="86" rx="18" fill="#070b0e" stroke="#263741"/>
    <text x="312" y="455" fill="#f3fff8" font-size="23" font-weight="700">Rule of the system</text>
    <text x="312" y="486" fill="#8fa7b2" font-size="20">Chevel AI thinks. Chevel Rocket supervises. WIESEL Mini executes.</text>
  </g>
</svg>
