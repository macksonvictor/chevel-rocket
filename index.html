<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animacao Geometrica Quadrada</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="stage" aria-label="Animacao geometrica com figuras quadradas">
        <div class="orbit orbit-sparks">
          <span class="bit bit-bar bit-top"></span>
          <span class="bit bit-bar bit-right"></span>
          <span class="bit bit-bar bit-bottom"></span>
          <span class="bit bit-dot bit-dot-a"></span>
          <span class="bit bit-dot bit-dot-b"></span>
        </div>

        <div class="orbit orbit-corners">
          <span class="corner corner-a"></span>
          <span class="corner corner-b"></span>
          <span class="corner corner-c"></span>
          <span class="corner corner-d"></span>
          <span class="orbit-dot orbit-dot-a"></span>
          <span class="orbit-dot orbit-dot-b"></span>
          <span class="orbit-dot orbit-dot-c"></span>
          <span class="orbit-dot orbit-dot-d"></span>
        </div>

        <div class="diamond diamond-outer"></div>
        <div class="diamond diamond-inner"></div>

        <div class="burst">
          <span style="--angle: 0deg"></span>
          <span style="--angle: 30deg"></span>
          <span style="--angle: 60deg"></span>
          <span style="--angle: 90deg"></span>
          <span style="--angle: 120deg"></span>
          <span style="--angle: 150deg"></span>
          <span style="--angle: 180deg"></span>
          <span style="--angle: 210deg"></span>
          <span style="--angle: 240deg"></span>
          <span style="--angle: 270deg"></span>
          <span style="--angle: 300deg"></span>
          <span style="--angle: 330deg"></span>
        </div>

        <div class="lanes lanes-left">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="lanes lanes-right">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="square-ring square-ring-outer"></div>
        <div class="square-ring square-ring-inner"></div>
        <div class="center-square"></div>
        <div class="final-shell"></div>
        <div class="final-cutout"></div>
      </div>
    </main>
  </body>
</html>
